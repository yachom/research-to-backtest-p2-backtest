# 표준계정 Registry (README §12.2, 명세 A4 §2)
#
# A4에서 SK하이닉스 실데이터(00164779, 2021~2025)로 검증·개정했다.
# statement_type(단일) → statement_types(복수)로 스키마를 개정한다 —
# 손익 계정은 IS·CIS 모두 허용해야 한다(DATA_NOTES A2-①: SK하이닉스는
# 손익이 전부 CIS에 담긴다). BS/CF는 각각 [BS]/[CF].
#
# 매칭은 (sj_div 필터 → concept → label) 순서다(명세 §3). accepted_concepts는
# "prefix:Name"(콜론) 형태이며, API의 account_id "prefix_Name"(언더스코어)는
# 로더가 `_`→`:`로 정규화한 뒤 비교한다. trade_receivables는 SK하이닉스가
# 표준계정 ifrs-full:TradeAndOtherCurrentReceivables가 아닌
# ifrs-full_CurrentTradeReceivables로 보고하므로 실데이터에서는 label('매출채권')
# 경로로 매칭된다(concept 미일치 → label 병행 매칭의 실증 사례, 명세 §3·§9).

revenue:
  korean_name: 매출액
  english_name: Revenue
  statement_types: [IS, CIS]
  balance_type: credit
  period_type: duration
  accepted_concepts:
    - ifrs-full:Revenue
  accepted_labels:
    - 매출액
    - 수익(매출액)
    - 영업수익
    - 매출

